<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#0a0a0a"/>

  <!-- Sidebar -->
  <rect width="200" height="800" fill="#111318"/>
  <rect x="200" width="1" height="800" fill="#1e2028"/>

  <!-- Logo area -->
  <rect x="16" y="16" width="32" height="32" rx="8" fill="#00d4aa" opacity="0.2"/>
  <rect x="22" y="22" width="20" height="20" rx="4" fill="#00d4aa"/>
  <text x="58" y="28" fill="#f0f0f0" font-size="13" font-weight="700">AttendanceChecker</text>
  <text x="58" y="42" fill="#6b7280" font-size="10">RFID Tracking</text>

  <!-- Nav items -->
  <rect x="16" y="84" width="14" height="12" rx="2" fill="#6b7280"/>
  <text x="38" y="95" fill="#6b7280" font-size="13">Dashboard</text>

  <rect x="16" y="122" width="14" height="14" rx="3" fill="#6b7280"/>
  <text x="38" y="133" fill="#6b7280" font-size="13">Schüler</text>

  <!-- Logs (active) -->
  <rect x="8" y="148" width="184" height="36" rx="6" fill="#00d4aa" opacity="0.15"/>
  <rect x="16" y="160" width="14" height="14" rx="2" fill="#00d4aa"/>
  <text x="38" y="171" fill="#00d4aa" font-size="13" font-weight="600">Logs</text>

  <rect x="16" y="198" width="14" height="14" rx="2" fill="#6b7280"/>
  <text x="38" y="209" fill="#6b7280" font-size="13">Analytics</text>

  <!-- System status -->
  <circle cx="20" cy="780" r="5" fill="#00d4aa"/>
  <text x="32" y="784" fill="#6b7280" font-size="11">System online</text>
  <text x="16" y="797" fill="#6b7280" font-size="10">Raspberry Pi connected</text>

  <!-- Main content -->
  <text x="228" y="44" fill="#f0f0f0" font-size="24" font-weight="700">Protokoll</text>
  <text x="228" y="62" fill="#6b7280" font-size="13">0 Einträge</text>

  <!-- Date filter + Alle button -->
  <rect x="1016" y="24" width="148" height="40" rx="6" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="1090" y="49" fill="#f0f0f0" font-size="13" text-anchor="middle">26.03.2026</text>
  <rect x="1170" y="24" width="94" height="40" rx="6" fill="#00d4aa"/>
  <text x="1217" y="49" fill="#0a0a0a" font-size="13" font-weight="700" text-anchor="middle">Alle</text>

  <!-- Divider -->
  <rect x="220" y="76" width="1044" height="1" fill="#1e2028"/>

  <!-- Table -->
  <rect x="228" y="94" width="1044" height="40" fill="#0f1117"/>
  <text x="248" y="119" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">ZEITSTEMPEL</text>
  <text x="460" y="119" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">SCHÜLER</text>
  <text x="680" y="119" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">KLASSE</text>
  <text x="860" y="119" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">RFID-ID</text>
  <text x="1060" y="119" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">EREIGNIS</text>

  <rect x="228" y="134" width="1044" height="1" fill="#1e2028"/>

  <!-- Empty state -->
  <rect x="228" y="135" width="1044" height="180" fill="#111318"/>
  <!-- Empty state icon -->
  <rect x="594" y="175" width="56" height="44" rx="6" fill="#1a1c23" stroke="#2a2d35" stroke-width="1.5"/>
  <rect x="606" y="186" width="32" height="3" rx="2" fill="#3a3d4a"/>
  <rect x="606" y="194" width="24" height="3" rx="2" fill="#3a3d4a"/>
  <rect x="606" y="202" width="28" height="3" rx="2" fill="#3a3d4a"/>
  <text x="750" y="215" fill="#6b7280" font-size="14" text-anchor="middle">Keine Einträge gefunden.</text>

  <rect x="228" y="315" width="1044" height="1" fill="#1e2028"/>

  <!-- Pagination hint -->
  <text x="750" y="360" fill="#3a3d4a" font-size="12" text-anchor="middle">Seite 1 von 1</text>
</svg>
