<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#0a0a0a"/>

  <!-- Sidebar -->
  <rect width="200" height="800" fill="#111318"/>
  <!-- Sidebar top border -->
  <rect x="200" width="1" height="800" fill="#1e2028"/>

  <!-- Logo area -->
  <rect x="16" y="16" width="32" height="32" rx="8" fill="#00d4aa" opacity="0.2"/>
  <rect x="22" y="22" width="20" height="20" rx="4" fill="#00d4aa"/>
  <text x="58" y="28" fill="#f0f0f0" font-size="13" font-weight="700">AttendanceChecker</text>
  <text x="58" y="42" fill="#6b7280" font-size="10">RFID Tracking</text>

  <!-- Nav items -->
  <!-- Dashboard (active) -->
  <rect x="8" y="72" width="184" height="36" rx="6" fill="#00d4aa" opacity="0.15"/>
  <rect x="16" y="84" width="14" height="12" rx="2" fill="#00d4aa"/>
  <text x="38" y="95" fill="#00d4aa" font-size="13" font-weight="600">Dashboard</text>

  <!-- Students -->
  <rect x="16" y="122" width="14" height="14" rx="3" fill="#6b7280"/>
  <text x="38" y="133" fill="#6b7280" font-size="13">Schüler</text>

  <!-- Logs -->
  <rect x="16" y="160" width="14" height="14" rx="2" fill="#6b7280"/>
  <text x="38" y="171" fill="#6b7280" font-size="13">Logs</text>

  <!-- Analytics -->
  <rect x="16" y="198" width="14" height="14" rx="2" fill="#6b7280"/>
  <text x="38" y="209" fill="#6b7280" font-size="13">Analytics</text>

  <!-- System status (bottom) -->
  <circle cx="20" cy="780" r="5" fill="#00d4aa"/>
  <text x="32" y="784" fill="#6b7280" font-size="11">System online</text>
  <text x="16" y="797" fill="#6b7280" font-size="10">Raspberry Pi connected</text>

  <!-- Main content area -->
  <!-- Page header -->
  <text x="228" y="44" fill="#f0f0f0" font-size="24" font-weight="700">Dashboard</text>
  <text x="228" y="62" fill="#6b7280" font-size="13">Anwesenheitsstatus &amp; Aktivität</text>

  <!-- Divider -->
  <rect x="220" y="76" width="1044" height="1" fill="#1e2028"/>

  <!-- Stat Cards -->
  <!-- Card 1: IN RAUM -->
  <rect x="228" y="94" width="232" height="96" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="248" y="116" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="1">IN RAUM</text>
  <text x="248" y="156" fill="#00d4aa" font-size="36" font-weight="700">0</text>
  <text x="248" y="178" fill="#6b7280" font-size="12">von 2 Schülern</text>

  <!-- Card 2: GESAMTE HEUTE -->
  <rect x="476" y="94" width="232" height="96" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="496" y="116" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="1">GESAMTE HEUTE</text>
  <text x="496" y="156" fill="#f0f0f0" font-size="36" font-weight="700">0</text>
  <text x="496" y="178" fill="#6b7280" font-size="12">Scans</text>

  <!-- Card 3: EINTRITTE -->
  <rect x="724" y="94" width="232" height="96" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="744" y="116" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="1">EINTRITTE</text>
  <text x="744" y="156" fill="#f0f0f0" font-size="36" font-weight="700">2</text>
  <text x="744" y="178" fill="#6b7280" font-size="12">diese Woche</text>

  <!-- Card 4: SCHÜLER -->
  <rect x="972" y="94" width="232" height="96" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="992" y="116" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="1">SCHÜLER</text>
  <text x="992" y="156" fill="#f0f0f0" font-size="36" font-weight="700">2</text>
  <text x="992" y="178" fill="#6b7280" font-size="12">registriert</text>

  <!-- Bottom panels -->
  <!-- Panel left: Aktuell im Raum -->
  <rect x="228" y="210" width="460" height="280" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="248" y="238" fill="#f0f0f0" font-size="15" font-weight="600">Aktuell im Raum</text>
  <!-- Live badge -->
  <rect x="350" y="224" width="44" height="18" rx="4" fill="#00d4aa" opacity="0.15"/>
  <circle cx="361" cy="233" r="4" fill="#00d4aa"/>
  <text x="369" y="237" fill="#00d4aa" font-size="11" font-weight="600">LIVE</text>
  <!-- Divider -->
  <rect x="228" y="250" width="460" height="1" fill="#1e2028"/>
  <!-- Empty state icon -->
  <circle cx="458" cy="340" r="40" fill="#1a1c23"/>
  <rect x="438" y="326" width="40" height="28" rx="4" fill="none" stroke="#3a3d4a" stroke-width="2"/>
  <circle cx="451" cy="340" r="5" fill="#3a3d4a"/>
  <circle cx="465" cy="340" r="5" fill="#3a3d4a"/>
  <text x="458" y="400" fill="#6b7280" font-size="13" text-anchor="middle">Niemand im Raum</text>

  <!-- Panel right: Letzte Aktivität -->
  <rect x="704" y="210" width="560" height="280" rx="8" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="724" y="238" fill="#f0f0f0" font-size="15" font-weight="600">Letzte Aktivität</text>
  <!-- "Alle anzeigen" link -->
  <text x="1210" y="238" fill="#00d4aa" font-size="12" text-anchor="end">Alle anzeigen</text>
  <!-- Divider -->
  <rect x="704" y="250" width="560" height="1" fill="#1e2028"/>

  <!-- Activity item 1 -->
  <circle cx="726" cy="282" r="16" fill="#1a3a35"/>
  <text x="726" y="287" fill="#00d4aa" font-size="13" font-weight="700" text-anchor="middle">R</text>
  <text x="752" y="277" fill="#f0f0f0" font-size="13" font-weight="500">Ralf Boss</text>
  <text x="752" y="293" fill="#6b7280" font-size="11">11:16</text>
  <rect x="1160" y="272" width="52" height="20" rx="4" fill="#1a3a35"/>
  <text x="1186" y="286" fill="#00d4aa" font-size="11" font-weight="600" text-anchor="middle">EINTRITT</text>

  <!-- Divider -->
  <rect x="704" y="308" width="560" height="1" fill="#1a1c23"/>

  <!-- Activity item 2 -->
  <circle cx="726" cy="340" r="16" fill="#1a3a35"/>
  <text x="726" y="345" fill="#00d4aa" font-size="13" font-weight="700" text-anchor="middle">B</text>
  <text x="752" y="335" fill="#f0f0f0" font-size="13" font-weight="500">Bernd Wurm</text>
  <text x="752" y="351" fill="#6b7280" font-size="11">11:12</text>
  <rect x="1160" y="330" width="52" height="20" rx="4" fill="#1a3a35"/>
  <text x="1186" y="344" fill="#00d4aa" font-size="11" font-weight="600" text-anchor="middle">EINTRITT</text>

  <!-- Divider -->
  <rect x="704" y="366" width="560" height="1" fill="#1a1c23"/>
</svg>
