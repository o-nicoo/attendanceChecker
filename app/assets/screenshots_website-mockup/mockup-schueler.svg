<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>text { font-family: 'Inter', 'Helvetica Neue', sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#0a0a0a"/>

  <!-- Sidebar -->
  <rect width="200" height="800" fill="#111318"/>
  <rect x="200" width="1" height="800" fill="#1e2028"/>

  <!-- Logo area -->
  <rect x="16" y="16" width="32" height="32" rx="8" fill="#00d4aa" opacity="0.2"/>
  <rect x="22" y="22" width="20" height="20" rx="4" fill="#00d4aa"/>
  <text x="58" y="28" fill="#f0f0f0" font-size="13" font-weight="700">AttendanceChecker</text>
  <text x="58" y="42" fill="#6b7280" font-size="10">RFID Tracking</text>

  <!-- Nav items -->
  <rect x="16" y="84" width="14" height="12" rx="2" fill="#6b7280"/>
  <text x="38" y="95" fill="#6b7280" font-size="13">Dashboard</text>

  <!-- Students (active) -->
  <rect x="8" y="110" width="184" height="36" rx="6" fill="#00d4aa" opacity="0.15"/>
  <rect x="16" y="122" width="14" height="14" rx="3" fill="#00d4aa"/>
  <text x="38" y="133" fill="#00d4aa" font-size="13" font-weight="600">Schüler</text>

  <rect x="16" y="160" width="14" height="14" rx="2" fill="#6b7280"/>
  <text x="38" y="171" fill="#6b7280" font-size="13">Logs</text>

  <rect x="16" y="198" width="14" height="14" rx="2" fill="#6b7280"/>
  <text x="38" y="209" fill="#6b7280" font-size="13">Analytics</text>

  <!-- System status -->
  <circle cx="20" cy="780" r="5" fill="#00d4aa"/>
  <text x="32" y="784" fill="#6b7280" font-size="11">System online</text>
  <text x="16" y="797" fill="#6b7280" font-size="10">Raspberry Pi connected</text>

  <!-- Main content -->
  <text x="228" y="44" fill="#f0f0f0" font-size="24" font-weight="700">Schüler</text>
  <text x="228" y="62" fill="#6b7280" font-size="13">2 registrierte Schüler</text>

  <!-- + Schüler hinzufügen button -->
  <rect x="1060" y="24" width="204" height="40" rx="6" fill="#00d4aa"/>
  <text x="1107" y="49" fill="#0a0a0a" font-size="14" font-weight="700">+ Schüler hinzufügen</text>

  <!-- Divider -->
  <rect x="220" y="76" width="1044" height="1" fill="#1e2028"/>

  <!-- Search bar -->
  <rect x="228" y="94" width="480" height="42" rx="6" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <rect x="244" y="110" width="14" height="10" rx="2" fill="#3a3d4a"/>
  <text x="266" y="120" fill="#3a3d4a" font-size="13">Name, RFID-ID oder Klasse suchen...</text>

  <!-- Table -->
  <!-- Class header IT27B -->
  <text x="228" y="166" fill="#f0f0f0" font-size="13" font-weight="700">IT27B</text>
  <rect x="228" y="174" width="1044" height="1" fill="#1e2028"/>

  <!-- Table header -->
  <rect x="228" y="175" width="1044" height="40" fill="#0f1117"/>
  <text x="288" y="200" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">NAME</text>
  <text x="540" y="200" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">RFID-ID</text>
  <text x="740" y="200" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">STATUS</text>
  <text x="920" y="200" fill="#6b7280" font-size="12" font-weight="600" letter-spacing="1">ZULETZT GESEHEN</text>

  <rect x="228" y="215" width="1044" height="1" fill="#1e2028"/>

  <!-- Row 1: Ralf Boss -->
  <rect x="228" y="216" width="1044" height="60" fill="#111318"/>
  <circle cx="258" cy="246" r="18" fill="#1a3a35"/>
  <text x="258" y="251" fill="#00d4aa" font-size="14" font-weight="700" text-anchor="middle">R</text>
  <text x="288" y="244" fill="#f0f0f0" font-size="14" font-weight="500">Ralf Boss</text>
  <text x="540" y="244" fill="#9ca3af" font-size="13">564332402730</text>
  <!-- Abwesend badge -->
  <rect x="740" y="234" width="74" height="22" rx="4" fill="#2a1515"/>
  <text x="777" y="249" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Abwesend</text>
  <text x="920" y="244" fill="#9ca3af" font-size="13">19.03., 13:30</text>
  <!-- Löschen button -->
  <rect x="1188" y="232" width="68" height="26" rx="4" fill="#2a1515"/>
  <text x="1222" y="249" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">Löschen</text>

  <rect x="228" y="276" width="1044" height="1" fill="#1e2028"/>

  <!-- Row 2: Bernd Wurm -->
  <rect x="228" y="277" width="1044" height="60" fill="#111318"/>
  <circle cx="258" cy="307" r="18" fill="#1a3a35"/>
  <text x="258" y="312" fill="#00d4aa" font-size="14" font-weight="700" text-anchor="middle">B</text>
  <text x="288" y="305" fill="#f0f0f0" font-size="14" font-weight="500">Bernd Wurm</text>
  <text x="540" y="305" fill="#9ca3af" font-size="13">810141698659</text>
  <!-- Abwesend badge -->
  <rect x="740" y="295" width="74" height="22" rx="4" fill="#2a1515"/>
  <text x="777" y="310" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Abwesend</text>
  <text x="920" y="305" fill="#9ca3af" font-size="13">19.03., 13:29</text>
  <!-- Löschen button -->
  <rect x="1188" y="293" width="68" height="26" rx="4" fill="#2a1515"/>
  <text x="1222" y="310" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">Löschen</text>

  <rect x="228" y="337" width="1044" height="1" fill="#1e2028"/>
</svg>
